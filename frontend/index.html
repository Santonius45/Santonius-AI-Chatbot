<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Santonius AI Chatbot</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- Header -->

        <div class="header">

            <h1>🤖 Santonius AI Chatbot</h1>

            <p>Powered by OpenAI GPT</p>

        </div>

        <!-- Chat Box -->

        <div id="chat-box">

            <div class="message ai">

                <div class="bubble">

                    Halo 👋

                    <br><br>

                    Saya adalah <b>Santonius AI</b>.

                    <br><br>

                    Silakan tanyakan apa saja.

                </div>

            </div>

        </div>

        <!-- Input -->

        <div class="input-area">

            <input

                id="message"

                type="text"

                placeholder="Ketik pertanyaan..."

                autocomplete="off"

            >

            <button id="sendBtn">

                Kirim

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
